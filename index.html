function scoreRing(score, size=88) {
  const r=32, c=2*Math.PI*r, off=c-(score/100)*c;
  return `<div class="relative flex items-center justify-center" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="-rotate-90" style="position:absolute;top:0;left:0">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="7"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${scoreStroke(score)}" stroke-width="7"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>
    <div class="flex flex-col items-center justify-center z-10">
      <span class="font-bold text-slate-900" style="font-size:${size>80?'1.1rem':'0.85rem'}">${score}%</span>
      <span class="text-slate-400" style="font-size:0.6rem;margin-top:-2px">match</span>
    </div>
  </div>`;
}

function skillChip(skill, matched=true) {
  if(matched) return `<span class="inline-flex items-center gap-1 text-xs bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded-full font-medium">✓ ${skill}</span>`;
  return `<span class="inline-flex items-center gap-1 text-xs bg-rose-50 text-rose-700 border border-rose-200 px-2 py-0.5 rounded-full font-medium">✕ ${skill}</span>`;
}

function svgBar(data, width=360, height=160) {
  const maxV = Math.max(...data.map(d=>Math.max(d.demand,d.supply)));
  const barW = 20, gap=8, groupW=barW*2+gap, groupGap=16;
  const totalW = data.length*(groupW+groupGap);
  const scaleH = h => (h/maxV)*(height-30);
  let bars='', labels='';
  data.forEach((d,i)=>{
    const x=i*(groupW+groupGap);
    const h1=scaleH(d.demand), h2=scaleH(d.supply);
    bars+=`<rect x="${x}" y="${height-30-h1}" width="${barW}" height="${h1}" rx="3" fill="#6366f1" opacity="0.85"/>`;
    bars+=`<rect x="${x+barW+gap}" y="${height-30-h2}" width="${barW}" height="${h2}" rx="3" fill="#22c55e" opacity="0.85"/>`;
    const label=d.skill.length>8?d.skill.slice(0,8)+'…':d.skill;
    labels+=`<text x="${x+groupW/2}" y="${height-8}" text-anchor="middle" fill="#94a3b8" font-size="10">${label}</text>`;
  });
  return `<svg viewBox="0 0 ${totalW+40} ${height}" class="w-full" style="max-height:${height}px">
    <g transform="translate(20,0)">${bars}${labels}</g>
  </svg>
  <div class="flex gap-4 mt-2">
    <div class="flex items-center gap-1.5 text-xs text-slate-600"><span class="w-3 h-3 rounded-sm bg-indigo-500 inline-block"></span>Forecasted Demand</div>
    <div class="flex items-center gap-1.5 text-xs text-slate-600"><span class="w-3 h-3 rounded-sm bg-emerald-500 inline-block"></span>Current Supply</div>
  </div>`;
}

function svgLine(data) {
  const W=340,H=130,pad=30;
  const maxV=Math.max(...data.map(d=>Math.max(d.bench,d.placed)));
  const px=(i)=>pad+i*(W-pad*2)/(data.length-1);
  const py=(v)=>H-pad-(v/maxV)*(H-pad*2);
  const benchPath=data.map((d,i)=>`${i===0?'M':'L'}${px(i)},${py(d.bench)}`).join(' ');
  const placedPath=data.map((d,i)=>`${i===0?'M':'L'}${px(i)},${py(d.placed)}`).join(' ');
  const dots1=data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.bench)}" r="3.5" fill="#ef4444"/>`).join('');
  const dots2=data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.placed)}" r="3.5" fill="#22c55e"/>`).join('');
  const xlabels=data.map((d,i)=>`<text x="${px(i)}" y="${H-4}" text-anchor="middle" fill="#94a3b8" font-size="11">${d.m}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="w-full" style="max-height:${H}px">
    <path d="${benchPath}" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${placedPath}" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots1}${dots2}${xlabels}
  </svg>
  <div class="flex gap-4 mt-1">
    <div class="flex items-center gap-1.5 text-xs text-slate-600"><span class="w-3 h-1 rounded bg-red-400 inline-block"></span>On Bench</div>
    <div class="flex items-center gap-1.5 text-xs text-slate-600"><span class="w-3 h-1 rounded bg-emerald-400 inline-block"></span>Placed</div>
  </div>`;
}

function svgPie(data) {
  const total=data.reduce((a,b)=>a+b.val,0);
  let angle=-90, slices='', legend='';
  data.forEach(d=>{
    const deg=(d.val/total)*360, rad=deg*Math.PI/180;
    const x1=50+45*Math.cos(angle*Math.PI/180), y1=50+45*Math.sin(angle*Math.PI/180);
    angle+=deg;
    const x2=50+45*Math.cos(angle*Math.PI/180), y2=50+45*Math.sin(angle*Math.PI/180);
    const large=deg>180?1:0;
    slices+=`<path d="M50,50 L${x1.toFixed(2)},${y1.toFixed(2)} A45,45 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${d.color}"/>`;
    legend+=`<div class="flex items-center gap-2 text-xs"><span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${d.color}"></span><span class="text-slate-600 flex-1">${d.name}</span><span class="font-semibold text-slate-800">${d.val}</span></div>`;
  });
  return `<div class="flex gap-4 items-start">
    <svg viewBox="0 0 100 100" class="shrink-0" style="width:120px;height:120px">${slices}</svg>
    <div class="space-y-1.5 flex-1 mt-2">${legend}</div>
  </div>`;
}

  const reqList=reqs.map(r=>`<div onclick="selectReq('${r.id}')" class="p-3 rounded-xl cursor-pointer transition-all border ${state.selectedReq===r.id?'bg-indigo-50 border-indigo-200':'bg-slate-50 border-transparent hover:border-slate-200'} mb-2">

  const candCards=candidates.map((c,i)=>{

    return `<div class="bg-white rounded-xl border-2 transition-all ${open?'border-indigo-300 shadow-md':'border-slate-200'} card-hover">

          </div>
          <p class="text-sm text-slate-600">${c.designation} · ${c.grade} · ${c.yoe}y exp</p>
          <div class="flex flex-wrap gap-1.5 mt-2">
            ${c.matched.map(s=>skillChip(s,true)).join('')}${c.missing.map(s=>skillChip(s,false)).join('')}
          </div>
        </div>
        <div class="shrink-0 flex flex-col items-end gap-2">
          <div class="flex flex-col items-center px-3 py-2.5 rounded-xl border font-bold ${scoreBg(c.score)}">
            <span class="text-xl ${scoreColor(c.score)}">${c.score}%</span>
            <span class="text-xs opacity-70">AI match</span>
          </div>
          <div class="text-right">
            <div class="text-xs font-semibold text-rose-600">⏱ ${c.bench} days bench</div>
            <div class="text-xs text-emerald-600 font-medium mt-0.5">${c.avail}</div>

        </div>
        <div class="self-center text-slate-400 ml-1">${open?'▲':'▼'}</div>
      </div>
      ${open?`<div class="border-t border-slate-100 px-5 pb-5 pt-4 space-y-4 slide-in">
        <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2"><span class="text-indigo-500">✦</span><span class="text-xs font-semibold text-indigo-700 uppercase tracking-wide">AI Recommendation</span></div>
            <span class="text-xs font-semibold text-indigo-600">${c.selProb}% selection probability</span>
          </div>
          <p class="text-sm text-indigo-800 leading-relaxed">${c.insight}</p>
        </div>
        <div>
          <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2.5">Why AI Recommended This Candidate</h4>
          ${c.reasons.map(r=>`<div class="flex items-start gap-2 text-sm text-slate-700 mb-1.5"><span class="text-emerald-500 mt-0.5 shrink-0">✓</span>${r}</div>`).join('')}
        </div>
        <div class="grid grid-cols-4 gap-3">
          <div class="bg-slate-50 rounded-lg p-3 text-center"><div class="text-lg font-bold text-slate-900">${c.yoe}y</div><div class="text-xs text-slate-500">Experience</div></div>
          <div class="bg-slate-50 rounded-lg p-3 text-center"><div class="text-lg font-bold text-slate-900">${c.projects.length}</div><div class="text-xs text-slate-500">Projects</div></div>
          <div class="bg-slate-50 rounded-lg p-3 text-center"><div class="text-lg font-bold text-slate-900">${c.certs.length}</div><div class="text-xs text-slate-500">Certs</div></div>
          <div class="rounded-lg p-3 text-center ${riskCls[c.benchRisk]}"><div class="text-lg font-bold capitalize">${c.benchRisk}</div><div class="text-xs opacity-70">Bench Risk</div></div>
        </div>
        <div class="flex flex-wrap gap-2">
          ${c.certs.map(cert=>`<span class="text-xs px-2.5 py-1 rounded-full border font-medium flex items-center gap-1 ${c.certs.includes(cert)?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-slate-50 text-slate-600 border-slate-200'}">★ ${cert}</span>`).join('')}
        </div>
        <div>
          <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Project History</h4>
          ${c.projects.map(p=>`<div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg text-sm mb-1.5"><span class="flex-1 font-semibold text-slate-800">${p.name}</span><span class="text-slate-500">${p.client}</span><span class="text-slate-400 text-xs">${p.duration}</span></div>`).join('')}
        </div>
        <div class="flex items-center gap-3 pt-1">
          <button onclick="openModal('${c.id}')" class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">📅 Schedule Interview</button>
          <button class="flex items-center gap-2 px-4 py-2.5 border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50">✓ Shortlist</button>
          <button class="ml-auto text-sm text-rose-500 hover:text-rose-600">Not a fit</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');

  const content=`<div class="flex h-full">
    <div class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0">
      <div class="p-4 border-b border-slate-200">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-slate-900 text-sm">Active Requisitions</h2>
          <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-medium">${reqs.length}</span>
        </div>
        <button class="w-full py-2 text-xs font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors">+ Post New Requirement</button>
      </div>
      <div class="flex-1 overflow-y-auto p-3">${reqList}</div>
    </div>
    <div class="flex-1 overflow-y-auto p-6 space-y-5">
      ${selReq?`<div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-start justify-between gap-4">
          <div>
            <div class="flex items-center gap-2 mb-1">
              <h2 class="text-lg font-semibold text-slate-900">${selReq.title}</h2>
              <span class="text-xs px-2 py-0.5 rounded-full border font-medium ${urgCls[selReq.urgency]}">${urgLabel[selReq.urgency]}</span>
            </div>
            <p class="text-sm text-slate-600">${DATA.opportunities.find(o=>o.id===selReq.id)?.project||''} · <strong>${selReq.client}</strong></p>
            <div class="flex items-center gap-4 mt-2 text-xs text-slate-500">
              <span>📅 Starts ${selReq.start}</span>
              <span>👥 ${selReq.candidates} candidates</span>
            </div>
          </div>
          <div class="bg-slate-50 rounded-xl px-4 py-3 text-center">
            <div class="text-xl font-bold text-indigo-600">${candidates.length}</div>
            <div class="text-xs text-slate-500">Matches</div>
          </div>
        </div>
      </div>`:''}
      <div class="flex items-center gap-3">
        <span class="text-sm text-slate-500">Filter:</span>
        <button onclick="setFilter('all')" class="text-xs px-3 py-1.5 rounded-lg font-medium ${state.filterAvail==='all'?'bg-indigo-600 text-white':'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}">All</button>
        <button onclick="setFilter('immediate')" class="text-xs px-3 py-1.5 rounded-lg font-medium ${state.filterAvail==='immediate'?'bg-indigo-600 text-white':'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}">Immediate</button>
        <span class="ml-auto text-xs text-slate-500">✦ Ranked by AI match score</span>
      </div>
      <div class="space-y-3">${candCards}</div>
    </div>
  </div>
  ${state.showModal?renderModal():''}`;
  return renderLayout(content);
}

function renderModal() {
  const cand=DATA.candidates.find(c=>c.id===state.modalCandidate);
  if(!cand) return '';
  if(state.modalConfirmed) return `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 modal-overlay">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full text-center shadow-2xl">
      <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">📅</div>
      <h3 class="text-xl font-bold text-slate-900 mb-2">Interview Scheduled!</h3>
      <p class="text-slate-600 mb-1"><strong>${cand.name}</strong> has been notified.</p>
      <p class="text-slate-500 text-sm mb-6">Video Call · July 5, 2024 at 10:00 AM</p>
      <div class="bg-slate-50 rounded-xl p-4 text-left mb-6">
        <p class="text-xs text-slate-500 font-medium mb-2">Calendar invites sent to:</p>
        <p class="text-sm text-slate-800">${cand.name.toLowerCase().replace(' ','.')}@company.com</p>
        <p class="text-sm text-slate-800">rajesh.kumar@company.com</p>
      </div>
      <button onclick="closeModal()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors">Done</button>
    </div>
  </div>`;

  return `<div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 modal-overlay">
    <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl overflow-hidden">
      <div class="bg-indigo-600 px-6 py-5">
        <h3 class="text-lg font-bold text-white">Schedule Interview</h3>
        <p class="text-indigo-200 text-sm mt-0.5">with ${cand.name} · ${cand.designation}</p>
      </div>
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div><label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Date</label>
            <input type="date" value="2024-07-05" class="w-full text-sm px-3 py-2.5 rounded-lg border border-slate-300 focus:border-indigo-400 outline-none" /></div>
          <div><label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Time</label>
            <select class="w-full text-sm px-3 py-2.5 rounded-lg border border-slate-300 focus:border-indigo-400 outline-none">
              <option>10:00 AM</option><option>11:00 AM</option><option>02:00 PM</option><option>03:00 PM</option>
            </select></div>
        </div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Interview Type</label>
          <div class="flex gap-2">
            <button class="flex-1 py-2 text-xs font-medium rounded-lg border bg-indigo-600 text-white border-indigo-600">Video Call</button>
            <button class="flex-1 py-2 text-xs font-medium rounded-lg border text-slate-600 border-slate-300 hover:bg-slate-50">Phone</button>
            <button class="flex-1 py-2 text-xs font-medium rounded-lg border text-slate-600 border-slate-300 hover:bg-slate-50">In-Person</button>
          </div></div>
        <div><label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">Notes</label>
          <textarea rows="3" placeholder="Focus areas, technical assessment details..." class="w-full text-sm px-3 py-2.5 rounded-lg border border-slate-300 focus:border-indigo-400 outline-none resize-none"></textarea></div>
        <div class="flex gap-3 pt-1">
          <button onclick="closeModal()" class="flex-1 py-2.5 text-sm font-medium text-slate-600 border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</button>
          <button onclick="confirmInterview()" class="flex-1 py-2.5 text-sm font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">Confirm & Notify</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// RENDER — ANALYTICS DASHBOARD
// ═══════════════════════════════════════════════════════
function renderAnalytics() {
  const a=DATA.analytics;
  const kpiColors={rose:'bg-rose-50 border-rose-200 text-rose-600',amber:'bg-amber-50 border-amber-200 text-amber-600',indigo:'bg-indigo-50 border-indigo-200 text-indigo-600',emerald:'bg-emerald-50 border-emerald-200 text-emerald-600'};
  const urgBadge={critical:'bg-rose-100 text-rose-700',high:'bg-amber-100 text-amber-700',medium:'bg-blue-100 text-blue-700',low:'bg-slate-100 text-slate-600'};
  const insightBg={gap:'bg-rose-50 border-rose-200',attrition:'bg-amber-50 border-amber-200',forecast:'bg-indigo-50 border-indigo-200',obsolescence:'bg-slate-50 border-slate-200'};
  const insightIcon={gap:'⚠️',attrition:'🚨',forecast:'⚡',obsolescence:'📉'};

  const content=`<div class="p-6 space-y-6">
    <!-- KPIs -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      ${a.kpis.map(k=>`<div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center border text-xl ${kpiColors[k.color]}">${k.icon}</div>
          <span class="text-xs font-semibold px-2 py-1 rounded-full ${k.good?'bg-emerald-50 text-emerald-700':'bg-rose-50 text-rose-700'}">${k.change}</span>
        </div>
        <p class="text-3xl font-bold text-slate-900 mb-1">${k.value}</p>
        <p class="text-sm text-slate-500">${k.label}</p>
      </div>`).join('')}
    </div>

    <!-- Charts Row 1 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <div><h3 class="font-semibold text-slate-900">Bench Reduction Trend</h3><p class="text-xs text-slate-500 mt-0.5">Monthly bench count vs placements</p></div>
          <span class="text-xs bg-emerald-50 text-emerald-700 px-2.5 py-1 rounded-full font-medium border border-emerald-200">22% improvement YTD</span>
        </div>
        ${svgLine(a.benchTrend)}
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <div><h3 class="font-semibold text-slate-900">Critical Skill Gap (6-Month Forecast)</h3><p class="text-xs text-slate-500 mt-0.5">Forecasted demand vs current supply</p></div>
          <span class="text-xs bg-rose-50 text-rose-700 px-2.5 py-1 rounded-full font-medium border border-rose-200">⚠ Action Needed</span>
        </div>
        ${svgBar(a.skillGap)}
      </div>
    </div>

    <!-- Charts Row 2 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <h3 class="font-semibold text-slate-900 mb-1">Bench by Skill Domain</h3>
        <p class="text-xs text-slate-500 mb-4">Current composition (48 total)</p>
        ${svgPie(a.domain)}
      </div>
      <div class="lg:col-span-2 bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <div><h3 class="font-semibold text-slate-900">Attrition Risk Monitor</h3><p class="text-xs text-slate-500 mt-0.5">AI-predicted risk for extended bench employees</p></div>
          <span class="text-xs bg-rose-50 text-rose-700 border border-rose-200 px-2.5 py-1 rounded-full font-medium">5 high-risk employees</span>
        </div>
        <div class="space-y-4">
          ${a.attrition.map(e=>{
            const col=e.risk>=70?'bg-rose-500':e.risk>=50?'bg-amber-500':'bg-blue-400';
            const tc=e.risk>=70?'text-rose-600':e.risk>=50?'text-amber-600':'text-blue-600';
            return `<div class="flex items-center gap-4">
              <div class="w-32 shrink-0"><p class="text-sm font-medium text-slate-800 truncate">${e.name}</p><p class="text-xs text-slate-400 truncate">${e.role}</p></div>
              <div class="flex-1">
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="${col} h-full rounded-full" style="width:${e.risk}%"></div></div>
                <p class="text-xs text-slate-400 mt-1">${e.signals}</p>
              </div>
              <div class="shrink-0 text-right w-16"><span class="text-sm font-bold ${tc}">${e.risk}%</span><p class="text-xs text-slate-400">${e.bench}d bench</p></div>
            </div>`;
          }).join('')}
        </div>
        <div class="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">
          <p class="text-xs text-amber-800"><strong>AI Alert:</strong> 2 employees (Arjun, Aisha) show LinkedIn profile activity spikes + 3+ interview declines — recommend immediate manager outreach.</p>
        </div>
      </div>
    </div>

    <!-- Forecast Table -->
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h3 class="font-semibold text-slate-900 mb-1 flex items-center gap-2">✦ 6-Month Workforce Demand Forecast</h3>
      <p class="text-xs text-slate-500 mb-5">AI-predicted skill demand from pipeline deals vs current internal supply</p>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-slate-200">
            ${['Skill','Category','Forecasted Demand','Current Supply','Gap','Trend','Urgency','Recommended Action'].map(h=>`<th class="text-left py-3 px-3 text-xs font-semibold text-slate-500 uppercase tracking-wide whitespace-nowrap">${h}</th>`).join('')}
          </tr></thead>
          <tbody class="divide-y divide-slate-100">
            ${a.forecast.map(row=>`<tr class="hover:bg-slate-50">
              <td class="py-3 px-3 font-semibold text-slate-900">${row.skill}</td>
              <td class="py-3 px-3 text-slate-500 text-xs">${row.cat}</td>
              <td class="py-3 px-3 font-bold text-indigo-600">${row.demand}</td>
              <td class="py-3 px-3 text-slate-700">${row.supply}</td>
              <td class="py-3 px-3 font-bold ${row.gap>0?'text-rose-600':'text-emerald-600'}">${row.gap>0?`−${row.gap}`:`+${Math.abs(row.gap)}`}</td>
              <td class="py-3 px-3 text-xs ${row.trend==='growing'?'text-rose-600':'text-slate-500'} capitalize">${row.trend==='growing'?'↑':'↓'} ${row.trend}</td>
              <td class="py-3 px-3"><span class="text-xs px-2 py-0.5 rounded-full font-medium capitalize ${urgBadge[row.urgency]}">${row.urgency}</span></td>
              <td class="py-3 px-3 text-xs ${row.gap>50?'text-rose-700':row.gap>0?'text-amber-700':'text-emerald-700'} font-medium">${row.gap>50?'Launch reskilling bootcamp':row.gap>0?'Targeted upskilling':'Surplus — consider rotation'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- AI Insights -->
    <div class="bg-white rounded-xl border border-slate-200 p-5">
      <h3 class="font-semibold text-slate-900 mb-1 flex items-center gap-2">✦ AI Strategic Recommendations</h3>
      <p class="text-xs text-slate-500 mb-5">Auto-generated from pipeline data, attrition signals, and skill demand forecasts</p>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        ${a.insights.map(ins=>`<div class="rounded-xl border p-4 ${insightBg[ins.type]}">
          <div class="flex items-start gap-3 mb-3">
            <span class="text-lg shrink-0 mt-0.5">${insightIcon[ins.type]}</span>
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <h4 class="text-sm font-semibold text-slate-900 leading-snug">${ins.title}</h4>
                <span class="text-xs px-2 py-0.5 rounded-full font-medium capitalize shrink-0 ${urgBadge[ins.urgency]}">${ins.urgency}</span>
              </div>
              <p class="text-xs text-slate-600 mt-1.5 leading-relaxed">${ins.desc}</p>
            </div>
          </div>
          <button class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 transition-colors">${ins.action} →</button>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
  return renderLayout(content);
}

// ═══════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════
function render() {
  const root=document.getElementById('root');
  if(!state.role){root.innerHTML=renderLogin();return;}
  if(state.page==='employee'){root.innerHTML=renderEmployee();}
  else if(state.page==='manager'){root.innerHTML=renderManager();}
  else if(state.page==='analytics'){root.innerHTML=renderAnalytics();}
}

// ═══════════════════════════════════════════════════════
// EVENT HANDLERS (global, called from onclick)
// ═══════════════════════════════════════════════════════
function login(role){
  state.role=role;
  state.page=role==='employee'?'employee':role==='manager'?'manager':'analytics';
  render();
}
function logout(){state.role=null;state.page='login';render();}
function navigate(page){state.page=page;render();}
function toggleOpp(id){state.expandedOpp=state.expandedOpp===id?'':id;render();}
function toggleCand(id){state.expandedCandidate=state.expandedCandidate===id?'':id;render();}
function setSort(s){state.sortBy=s;render();}
function setFilter(f){state.filterAvail=f;render();}
function selectReq(id){state.selectedReq=id;render();}
function applyJob(id){state.appliedJobs.add(id);render();}
function openModal(id){state.showModal=true;state.modalCandidate=id;state.modalConfirmed=false;render();}
function closeModal(){state.showModal=false;state.modalCandidate=null;state.modalConfirmed=false;render();}
function confirmInterview(){state.modalConfirmed=true;render();}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
